services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root_password
            MYSQL_DATABASE: database_extension_test
            MYSQL_USER: test_user
            MYSQL_PASSWORD: test_password
        ports:
            - "13306:3306"
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "test_user",
                    "-ptest_password",
                ]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 15s

    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: database_extension_test
            POSTGRES_USER: test_user
            POSTGRES_PASSWORD: test_password
        ports:
            - "15432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U test_user -d database_extension_test"]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 10s

    php82-sf73:
        build:
            context: .
            dockerfile: Dockerfile.test
            args:
                PHP_VERSION: "8.2"
        working_dir: /app
        volumes:
            - .:/app
            - composer-cache:/tmp/composer-cache
        environment:
            APP_ENV: test
            APP_DEBUG: 1
            SYMFONY_CONSTRAINT: ^7.3
            COMPOSER_CACHE_DIR: /tmp/composer-cache
            TEST_MYSQL_URL: mysql://test_user:test_password@mysql:3306/database_extension_test?serverVersion=8.0
            TEST_PGSQL_URL: postgresql://test_user:test_password@postgres:5432/database_extension_test?serverVersion=16
            TEST_SQLITE_PATH: /tmp/database_extension_test.sqlite
        depends_on:
            mysql:
                condition: service_healthy
            postgres:
                condition: service_healthy
        command: ["bash", "/app/tests/bin/run-container-phpunit.sh"]

    php84-sf80:
        build:
            context: .
            dockerfile: Dockerfile.test
            args:
                PHP_VERSION: "8.4"
        working_dir: /app
        volumes:
            - .:/app
            - composer-cache:/tmp/composer-cache
        environment:
            APP_ENV: test
            APP_DEBUG: 1
            SYMFONY_CONSTRAINT: ^8.0
            COMPOSER_CACHE_DIR: /tmp/composer-cache
            TEST_MYSQL_URL: mysql://test_user:test_password@mysql:3306/database_extension_test?serverVersion=8.0
            TEST_PGSQL_URL: postgresql://test_user:test_password@postgres:5432/database_extension_test?serverVersion=16
            TEST_SQLITE_PATH: /tmp/database_extension_test.sqlite
        depends_on:
            mysql:
                condition: service_healthy
            postgres:
                condition: service_healthy
        command: ["bash", "/app/tests/bin/run-container-phpunit.sh"]

volumes:
    composer-cache:
