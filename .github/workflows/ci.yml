name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (PHP 8.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linters
        run: bash tests/bin/run-docker-quality.sh lint

  test:
    name: Test (PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            symfony: "^7.3"
            mode: php82
          - php: "8.3"
            symfony: "^7.3"
            mode: php83
          - php: "8.4"
            symfony: "^8.0"
            mode: php84

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: bash tests/bin/run-docker-phpunit.sh ${{ matrix.mode }}
